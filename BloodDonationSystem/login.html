<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Blood Donation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="login.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="#">🩸 Blood Donation System</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="Index.html">Home</a></li>
        </ul>
      </div>
    </div>
  </nav>

<div class="card w-25">
  <h3 class="text-center" class="mb-4">Admin Login</h3>
  <div class="text-center mb-3">
  </div>

  <form id="loginForm">
    <input type="text" class="form-control mb-3" id="username" placeholder="Username" required>
    <input type="password" class="form-control mb-3" id="password" placeholder="Password" required>
    <button type="submit" class="btn-custom w-100 mb-3">Login</button>
  </form>
</div>

</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  if(user === "Mohammad Sohail" && pass === "9801686031"){
    localStorage.setItem("isAdmin", "true");
    window.location.href = "admin.html";
  } else {
    alert("Invalid credentials! ❌");
  }
});
</script>

</body>
</html>

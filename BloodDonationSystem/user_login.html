<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login / Signup - Blood Donation System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="user_login.css" />
</head>

<body>
  <nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="#">🩸 Blood Donation System</a>
    <ul class="navbar-nav flex-row">
      <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
    </ul>
  </nav>

  <div class="card text-center">
    <h3 id="formTitle" class="mb-4">User Login</h3>

    <form id="loginForm">
      <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
      <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
      <button type="submit" class="btn-custom w-100 mb-3">Login</button>
      <p>Don't have an account? <span class="toggle-link" id="showSignup">Sign Up</span></p>
    </form>

    <form id="signupForm" style="display:none;">
      <input type="text" id="name" class="form-control mb-3" placeholder="Full Name" required>
      <input type="email" id="signupEmail" class="form-control mb-3" placeholder="Email" required>
      <input type="password" id="signupPassword" class="form-control mb-3" placeholder="Password" required>
      <button type="submit" class="btn-custom w-100 mb-3">Sign Up</button>
      <p>Already have an account? <span class="toggle-link" id="showLogin">Login</span></p>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const formTitle = document.getElementById('formTitle');

    document.getElementById('showSignup').onclick = () => {
      loginForm.style.display = 'none';
      signupForm.style.display = 'block';
      formTitle.textContent = 'User Signup';
    };
    document.getElementById('showLogin').onclick = () => {
      signupForm.style.display = 'none';
      loginForm.style.display = 'block';
      formTitle.textContent = 'User Login';
    };

    signupForm.addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const name = document.getElementById('name').value;

      localStorage.setItem('userEmail', email);
      localStorage.setItem('userPassword', password);
      localStorage.setItem('userName', name);
      alert('Signup successful! Please login now.');
      signupForm.reset();
      document.getElementById('showLogin').click();
    });

    loginForm.addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const savedEmail = localStorage.getItem('userEmail');
      const savedPass = localStorage.getItem('userPassword');

      if(email === savedEmail && password === savedPass){
        localStorage.setItem("userLoggedIn", "true");
        alert("Login successful!");

        const redirectPage = localStorage.getItem("redirectAfterLogin") || "index.html";
        localStorage.removeItem("redirectAfterLogin");
        window.location.href = redirectPage;
      } else {
        alert("Invalid email or password!");
      }
    });
  </script>

</body>
</html>
